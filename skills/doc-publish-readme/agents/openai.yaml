interface:
  display_name: "Project Readme Localize"
  short_description: "Create or refresh the repo root README as a GitHub-friendly project entrypoint, then publish easy-to-read localized entry docs under docs/i18n/<lang>/. Use when the target is a project repo and readers need a root landing doc plus language-specific entrypoints."
  default_prompt: "$doc-publish-readme"
policy:
  allow_implicit_invocation: true
